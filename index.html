<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <title>DragonStore</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" type="image/png" href="IMG_5177.png">
</head>
<body onclick="deselectApps(event)">

    <header>
        <div class="brand-container">
            <img src="IMG_5177.PNG" alt="Icon" class="store-icon">
            <h1>DragonStore</h1>
        </div>
        
        <div class="forger-container">
            <input type="text" id="urlInput" placeholder="Enter URL to Forge App...">
            <button onclick="forgeApp()">FORGE</button>
        </div>

        <div class="instructions-box">
            <h4>INSTRUCTIONS</h4>
            <p>1. Click <b>GET</b> to open the app in a new tab.<br> 
               2. Click the <b>3 dots (⋮)</b> in the top right corner (below the X).<br>
               3. Go to <b>Cast, save and share</b> > <b>Install page as app</b>.</p>
        </div>
    </header>

    <main class="app-grid" id="appGrid">
        <script>
            // All 30 apps are ready
            const apps = [
                { name: "Google Gemini", url: "https://gemini.google.com", img: "Google Gemini.jpg" },
                { name: "Word Online", url: "https://www.microsoft365.com/launch/word", img: "Word.jpg" },
                { name: "Excel Online", url: "https://www.microsoft365.com/launch/excel", img: "Excel.jpg" },
                { name: "PowerPoint", url: "https://www.microsoft365.com/launch/powerpoint", img: "PowerPoint.jpg" },
                { name: "Discord", url: "https://discord.com/app", img: "Discord.jpg" },
                { name: "Spotify", url: "https://open.spotify.com", img: "Spotify.jpg" },
                { name: "YouTube", url: "https://youtube.com", img: "YT.jpg" },
                { name: "WhatsApp", url: "https://web.whatsapp.com", img: "WhatsApp.jpg" },
                { name: "Telegram", url: "https://web.telegram.org", img: "Telegram.jpg" },
                { name: "Gmail", url: "https://mail.google.com", img: "Gmail.jpg" },
                { name: "Canva", url: "https://canva.com", img: "Canva.jpg" },
                { name: "GitHub", url: "https://github.com", img: "GitHub.jpg" },
                { name: "VS Code Online", url: "https://vscode.dev", img: "VSC.jpg" },
                { name: "Twitch", url: "https://twitch.tv", img: "Twitch.jpg" },
                { name: "Reddit", url: "https://reddit.com", img: "Reddit.jpg" },
                { name: "X / Twitter", url: "https://x.com", img: "X.jpg" },
                { name: "Pinterest", url: "https://pinterest.com", img: "Pinterest.jpg" },
                { name: "Macedonian Radio", url: "https://play.mrt.com.mk/", img: "MKradio.jpg" },
                { name: "Google Maps", url: "https://maps.google.com", img: "GMaps.jpg" },
                { name: "Google Photos", url: "https://photos.google.com", img: "GPhotos.jpg" },
                { name: "Google Drive", url: "https://drive.google.com", img: "GDrive.jpg" },
                { name: "Google Keep", url: "https://keep.google.com", img: "Keep.jpg" },
                { name: "Netflix", url: "https://netflix.com", img: "NF.jpg" },
                { name: "Disney+", url: "https://disneyplus.com", img: "D+.jpg" },
                { name: "Prime Video", url: "https://primevideo.com", img: "PV.jpg" },
                { name: "SoundCloud", url: "https://soundcloud.com", img: "SCloud.jpg" },
                { name: "TikTok", url: "https://tiktok.com", img: "TikTok.jpg" },
                { name: "Facebook", url: "https://facebook.com", img: "Fb.jpg" },
                { name: "Instagram", url: "https://instagram.com", img: "Insta.jpg" },
                { name: "GitHub Codespace", url: "https://github.dev", img: "GH Code.jpg" },
            ];

            const grid = document.getElementById('appGrid');
            apps.forEach(app => {
                const tile = document.createElement('div');
                tile.className = 'app-tile';
                tile.innerHTML = `
                    <img src="${app.img}" class="app-cover">
                    <div class="tile-bottom">
                        <h3>${app.name}</h3>
                        <button class="get-btn" onclick="installApp('${app.url}', event)">GET</button>
                    </div>
                `;
                tile.onclick = (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.app-tile').forEach(t => t.classList.remove('expanded'));
                    tile.classList.add('expanded');
                };
                grid.appendChild(tile);
            });

            function deselectApps(event) {
                document.querySelectorAll('.app-tile').forEach(t => t.classList.remove('expanded'));
            }

            function installApp(url, event) {
                event.stopPropagation();
                window.open(url, '_blank');
            }

            function forgeApp() {
                let url = document.getElementById('urlInput').value;
                if (url) {
                    if (!url.startsWith('http')) url = 'https://' + url;
                    window.open(url, '_blank');
                }
            }

            document.addEventListener('mousemove', e => {
                document.querySelectorAll('.app-tile').forEach(tile => {
                    const rect = tile.getBoundingClientRect();
                    tile.style.setProperty('--x', `${e.clientX - rect.left}px`);
                    tile.style.setProperty('--y', `${e.clientY - rect.top}px`);
                });
            });
        </script>
    </main>

    <footer>
        <p>© 2026 DragonStore in DragonOS | Made with 🍀 in Macedonia</p>
    </footer>

</body>
</html>
